name: Build for Windows and Linux
on: [push]

jobs:
  build:
    strategy:
      matrix:
        # এটি উইন্ডোজ এবং লিনাক্স দুই প্ল্যাটফর্মেই রান করবে
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter yt-dlp pyinstaller Pillow

      - name: Build Executable
        run: |
          # উইন্ডোজ এবং লিনাক্স দুটিতেই এই কমান্ড কাজ করবে
          pyinstaller --noconsole --onefile --clean yt_app.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Downloader-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/yt_app
